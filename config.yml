# Ledger — frontend configuration
#
# The real Gemini API key is NOT set here anymore -- it lives server-side as
# an environment variable on your deployed FastAPI backend (GEMINI_API_KEY),
# never in a file the browser fetches.
#
# This file only points the static demo at that backend.
#
# Keep this file in the SAME FOLDER as servicing-agent-demo.html -- the page
# fetches it by relative path ("./config.yml") when it loads.
#
# IMPORTANT: browsers block fetch() for files opened directly (file://). You
# must serve this folder over a local web server, then open the page through
# that server, e.g.:
#
#   python3 -m http.server 8000
#   # then open http://localhost:8000/servicing-agent-demo.html
#
# backend_url: the deployed FastAPI service from backend/ (Render, Fly.io,
# Railway, etc.) -- must expose POST /api/generate. Example:
#   backend_url: "https://ledger-backend.onrender.com"
#
# proxy_key: optional, only needed if you set PROXY_ACCESS_KEY on the backend.
# This is NOT a secret in the security sense -- it still ships to the browser
# and is visible in dev tools. It just lets you rotate/rate-limit access to
# your backend independently of your real Gemini key. Leave blank to disable.

backend_url: "backend_url: "https://ledger-backend-xxxx.onrender.com"
proxy_key: ""
