<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4A5568"/>
    </marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F0A63B"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="480" fill="#FAFAF9"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1A202C">Ledger — Decision Flow</text>

  <!-- Row of main flow boxes -->
  <!-- Member message -->
  <rect x="30" y="90" width="150" height="70" rx="10" fill="#FFFFFF" stroke="#CBD5E0" stroke-width="1.5"/>
  <text x="105" y="120" text-anchor="middle" font-size="14" font-weight="600" fill="#1A202C">Member</text>
  <text x="105" y="138" text-anchor="middle" font-size="14" font-weight="600" fill="#1A202C">message</text>

  <!-- Classify -->
  <rect x="230" y="90" width="170" height="70" rx="10" fill="#EBF4FF" stroke="#6C9CFF" stroke-width="1.5"/>
  <text x="315" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="#1A365D">Classify</text>
  <text x="315" y="133" text-anchor="middle" font-size="12" fill="#2C5282">rules + LLM</text>
  <text x="315" y="149" text-anchor="middle" font-size="12" fill="#2C5282">→ route</text>

  <!-- Policy check -->
  <rect x="450" y="90" width="190" height="70" rx="10" fill="#FFF7E6" stroke="#F0A63B" stroke-width="1.5"/>
  <text x="545" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="#7B4B00">Policy check</text>
  <text x="545" y="133" text-anchor="middle" font-size="12" fill="#8A5A00">versioned rules</text>
  <text x="545" y="149" text-anchor="middle" font-size="12" fill="#8A5A00">engine</text>

  <!-- Execute -->
  <rect x="690" y="30" width="190" height="70" rx="10" fill="#E9F9EE" stroke="#4FD1AE" stroke-width="1.5"/>
  <text x="785" y="55" text-anchor="middle" font-size="14" font-weight="600" fill="#14532D">Execute</text>
  <text x="785" y="73" text-anchor="middle" font-size="12" fill="#166534">core-system</text>
  <text x="785" y="89" text-anchor="middle" font-size="12" fill="#166534">connector</text>

  <!-- Escalate -->
  <rect x="690" y="150" width="190" height="70" rx="10" fill="#FDECEC" stroke="#E57373" stroke-width="1.5"/>
  <text x="785" y="175" text-anchor="middle" font-size="14" font-weight="600" fill="#7A2020">Escalate</text>
  <text x="785" y="193" text-anchor="middle" font-size="12" fill="#8A2C2C">full-context</text>
  <text x="785" y="209" text-anchor="middle" font-size="12" fill="#8A2C2C">handoff</text>

  <!-- Confirm -->
  <rect x="960" y="90" width="180" height="70" rx="10" fill="#FFFFFF" stroke="#CBD5E0" stroke-width="1.5"/>
  <text x="1050" y="120" text-anchor="middle" font-size="14" font-weight="600" fill="#1A202C">Confirm to</text>
  <text x="1050" y="138" text-anchor="middle" font-size="14" font-weight="600" fill="#1A202C">member</text>

  <!-- Main flow arrows -->
  <path d="M180,125 L228,125" stroke="#4A5568" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M400,125 L448,125" stroke="#4A5568" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M600,110 C640,95 655,75 688,65" stroke="#4A5568" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M600,140 C640,155 655,175 688,185" stroke="#4A5568" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M880,65 C920,65 940,90 958,110" stroke="#4A5568" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M880,185 C920,185 940,150 958,130" stroke="#4A5568" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

  <text x="655" y="60" text-anchor="middle" font-size="11" fill="#4A5568">within policy</text>
  <text x="655" y="235" text-anchor="middle" font-size="11" fill="#4A5568">outside policy</text>

  <!-- Audit ledger -->
  <rect x="380" y="330" width="440" height="90" rx="12" fill="#FDF6EC" stroke="#F0A63B" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="600" y="365" text-anchor="middle" font-size="15" font-weight="700" fill="#7B4B00">🔗 Hash-chained audit ledger</text>
  <text x="600" y="386" text-anchor="middle" font-size="12" fill="#8A5A00">Each entry written BEFORE the corresponding action executes</text>
  <text x="600" y="403" text-anchor="middle" font-size="12" fill="#8A5A00">Tamper-evident: altering any entry breaks every hash after it</text>

  <!-- Dashed audit lines from classify / policy / execute / escalate down to ledger -->
  <path d="M315,160 L315,300 L470,332" stroke="#F0A63B" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowDash)" fill="none"/>
  <path d="M545,160 L545,332" stroke="#F0A63B" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowDash)" fill="none"/>
  <path d="M785,100 L785,300 L660,332" stroke="#F0A63B" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowDash)" fill="none"/>
  <path d="M785,220 L785,300 L700,332" stroke="#F0A63B" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowDash)" fill="none"/>

  <text x="600" y="455" text-anchor="middle" font-size="11" fill="#A0AEC0">The model proposes an action — a separate policy engine approves it — only then does a connector execute it</text>
</svg>
