<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — Servicing Agent Console</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --ink:#0B1220;
    --panel:#111A2E;
    --panel-2:#16213A;
    --line:#24314D;
    --text:#E7ECF3;
    --text-muted:#8FA0BD;
    --accent-teal:#4FD1AE;
    --accent-amber:#F0A63B;
    --accent-blue:#6C9CFF;
    --danger:#FF6B6B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--text);font-family:'IBM Plex Sans',sans-serif;height:100%;}
  ::selection{background:var(--accent-blue);color:#0B1220;}

  .app{display:flex;flex-direction:column;height:100vh;min-height:640px;}

  /* Top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#0D1526,#0B1220);}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .mark{width:22px;height:22px;border-radius:5px;background:var(--accent-teal);position:relative;flex:none;}
  .brand .mark::after{content:"";position:absolute;inset:5px;border-radius:2px;background:var(--ink);}
  .brand .name{font-weight:700;letter-spacing:0.02em;font-size:15px;}
  .brand .sub{color:var(--text-muted);font-size:12px;font-family:'IBM Plex Mono',monospace;}
  .status{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-muted);}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--accent-teal);box-shadow:0 0 0 3px rgba(79,209,174,0.15);}
  .dot.off{background:var(--danger);box-shadow:0 0 0 3px rgba(255,107,107,0.15);}

  .key-form{display:flex;align-items:center;gap:10px;}
  .key-form button{background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-weight:600;cursor:pointer;font-size:11.5px;font-family:'IBM Plex Mono',monospace;}
  .key-form button:hover{border-color:var(--accent-blue);}
  .key-form button:disabled{opacity:0.4;cursor:not-allowed;}

  .config-hint{margin:12px 22px 0;padding:10px 14px;border-radius:8px;background:rgba(240,166,59,0.1);border:1px solid var(--accent-amber);color:var(--accent-amber);font-family:'IBM Plex Mono',monospace;font-size:11.5px;line-height:1.5;}
  .config-hint code{background:rgba(0,0,0,0.25);padding:1px 5px;border-radius:4px;}

  /* Body layout */
  .body{flex:1;display:grid;grid-template-columns:1.15fr 1fr;min-height:0;}
  @media (max-width:900px){ .body{grid-template-columns:1fr;} }

  /* Chat column */
  .chat-col{display:flex;flex-direction:column;min-height:0;border-right:1px solid var(--line);}
  .snapshot{display:flex;gap:0;padding:12px 20px;border-bottom:1px solid var(--line);background:var(--panel);}
  .snap-item{flex:1;padding:6px 14px;border-right:1px solid var(--line);}
  .snap-item:last-child{border-right:none;}
  .snap-label{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:3px;}
  .snap-value{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;}
  .snap-value.flash{animation:flash 900ms ease;}
  @keyframes flash{0%{color:var(--accent-teal);}100%{color:var(--text);}}

  .transcript{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;}
  .msg{max-width:78%;padding:11px 15px;border-radius:12px;font-size:14px;line-height:1.5;}
  .msg.member{align-self:flex-end;background:var(--accent-blue);color:#0B1220;border-bottom-right-radius:3px;}
  .msg.agent{align-self:flex-start;background:var(--panel-2);border:1px solid var(--line);border-bottom-left-radius:3px;}
  .msg.system-note{align-self:center;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-muted);background:transparent;border:1px dashed var(--line);padding:6px 12px;border-radius:20px;}
  .msg.escalation{align-self:flex-start;background:rgba(240,166,59,0.12);border:1px solid var(--accent-amber);color:var(--text);}
  .typing{align-self:flex-start;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:4px 4px;}

  .composer{display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--line);background:var(--panel);}
  .composer input{flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;font-family:'IBM Plex Sans',sans-serif;outline:none;}
  .composer input:focus{border-color:var(--accent-blue);}
  .composer button{background:var(--accent-teal);color:#0B1220;border:none;border-radius:10px;padding:0 20px;font-weight:600;cursor:pointer;font-size:14px;}
  .composer button:disabled{opacity:0.4;cursor:not-allowed;}
  .quick-row{display:flex;gap:8px;padding:0 20px 14px;flex-wrap:wrap;}
  .quick{font-family:'IBM Plex Mono',monospace;font-size:11px;background:var(--panel-2);border:1px solid var(--line);color:var(--text-muted);padding:6px 10px;border-radius:20px;cursor:pointer;}
  .quick:hover{border-color:var(--accent-blue);color:var(--text);}

  /* Ledger column */
  .ledger-col{display:flex;flex-direction:column;min-height:0;background:var(--panel);}
  .ledger-head{padding:16px 20px 10px;border-bottom:1px solid var(--line);}
  .ledger-head h2{margin:0 0 3px;font-size:14px;letter-spacing:0.02em;}
  .ledger-head p{margin:0;color:var(--text-muted);font-size:12px;}
  .ledger-actions{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid var(--line);}
  .ledger-actions button{flex:1;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:8px 8px;border-radius:8px;border:1px solid var(--line);background:var(--panel-2);color:var(--text);cursor:pointer;}
  .ledger-actions button:hover{border-color:var(--accent-blue);}
  .ledger-actions button.danger:hover{border-color:var(--danger);}

  .verify-banner{margin:10px 20px 0;padding:9px 12px;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:12px;display:none;}
  .verify-banner.ok{display:block;background:rgba(79,209,174,0.12);border:1px solid var(--accent-teal);color:var(--accent-teal);}
  .verify-banner.bad{display:block;background:rgba(255,107,107,0.12);border:1px solid var(--danger);color:var(--danger);}

  .chain{flex:1;overflow-y:auto;padding:16px 20px 30px;position:relative;}
  .block{position:relative;padding-left:22px;padding-bottom:20px;}
  .block::before{content:"";position:absolute;left:5px;top:14px;bottom:0;width:1px;background:var(--line);}
  .block:last-child::before{display:none;}
  .block .node{position:absolute;left:0;top:4px;width:11px;height:11px;border-radius:50%;background:var(--panel);border:2px solid var(--accent-blue);}
  .block.tool_call .node{border-color:var(--accent-teal);}
  .block.escalation .node{border-color:var(--accent-amber);}
  .block.policy_decision .node{border-color:#B98BFF;}
  .block.tampered .node{border-color:var(--danger);background:var(--danger);}

  .block-card{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;}
  .block-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
  .block-type{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--accent-blue);}
  .block.tool_call .block-type{color:var(--accent-teal);}
  .block.escalation .block-type{color:var(--accent-amber);}
  .block.policy_decision .block-type{color:#B98BFF;}
  .block-time{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-muted);}
  .block-actor{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--text-muted);margin-bottom:6px;}
  .block-payload{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text);background:var(--ink);border-radius:6px;padding:7px 9px;white-space:pre-wrap;word-break:break-word;max-height:130px;overflow-y:auto;}
  .block-hash{margin-top:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-muted);}
  .block-hash b{color:var(--accent-blue);}

  .empty-hint{color:var(--text-muted);font-size:12px;font-family:'IBM Plex Mono',monospace;padding:10px 0;}
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand">
      <div class="mark"></div>
      <div>
        <div class="name">Ledger <span style="color:var(--text-muted);font-weight:500;">— Servicing Agent Console</span></div>
        <div class="sub">session <span id="sessionId">—</span></div>
      </div>
    </div>
    <div class="key-form">
      <span class="status"><span class="dot off" id="statusDot"></span> <span id="statusText">loading config.yml…</span></span>
      <button id="reloadConfigBtn">Reload config.yml</button>
    </div>
  </div>

  <div class="config-hint" id="configHint" style="display:none;"></div>

  <div class="body">
    <div class="chat-col">
      <div class="snapshot" id="snapshot"></div>
      <div class="transcript" id="transcript"></div>
      <div class="quick-row">
        <div class="quick" data-msg="Hey, I was charged a late fee last week and I'd like it removed — I've always paid on time.">Fee reversal</div>
        <div class="quick" data-msg="Can you increase my credit limit to $6000?">Limit increase</div>
        <div class="quick" data-msg="I lost my card yesterday, I need a new one as fast as possible.">Lost card</div>
        <div class="quick" data-msg="I see a $600 charge I never made — this looks like fraud.">Escalation case</div>
      </div>
      <div class="composer">
        <input id="input" type="text" placeholder="Type as the card member…" autocomplete="off">
        <button id="send">Send</button>
      </div>
    </div>

    <div class="ledger-col">
      <div class="ledger-head">
        <h2>Audit ledger</h2>
        <p>Every decision and system call, hash-chained and append-only.</p>
      </div>
      <div class="ledger-actions">
        <button id="verifyBtn">✓ Verify chain integrity</button>
        <button id="tamperBtn" class="danger">⚠ Simulate tamper</button>
      </div>
      <div class="verify-banner" id="verifyBanner"></div>
      <div class="chain" id="chain"><div class="empty-hint">No entries yet — start a conversation on the left.</div></div>
    </div>
  </div>
</div>

<script>
// ---------- Session & mock account state ----------
const sessionId = 'sess_' + Math.random().toString(36).slice(2, 10);
document.getElementById('sessionId').textContent = sessionId;

const account = {
  member_id: 'member_demo',
  account_open_days: 540,
  credit_limit: 5000,
  available_credit: 4200,
  late_payments_12mo: 0,
  card_last4: '4321',
  card_status: 'active',
  fees_12mo: [{ type: 'late_fee', amount: 35.0, reversed: false }],
  fee_reversals_used: 0
};

const conversation = []; // {role, content}
let chain = []; // audit entries
let prevHash = '0'.repeat(64);
let escalated = false;

// ---------- Hashing ----------
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function appendAudit(event_type, actor, payload) {
  const entry = {
    id: 'e_' + Math.random().toString(36).slice(2, 9),
    session_id: sessionId,
    timestamp: new Date().toISOString(),
    event_type, actor, payload,
    prev_hash: prevHash
  };
  const canonical = JSON.stringify({
    id: entry.id, session_id: entry.session_id, timestamp: entry.timestamp,
    event_type: entry.event_type, actor: entry.actor, payload: entry.payload, prev_hash: entry.prev_hash
  });
  entry.hash = await sha256(canonical);
  prevHash = entry.hash;
  chain.push(entry);
  renderChain();
  return entry;
}

async function recomputeHash(entry) {
  const canonical = JSON.stringify({
    id: entry.id, session_id: entry.session_id, timestamp: entry.timestamp,
    event_type: entry.event_type, actor: entry.actor, payload: entry.payload, prev_hash: entry.prev_hash
  });
  return sha256(canonical);
}

async function verifyChain() {
  let expected = '0'.repeat(64);
  for (const e of chain) {
    if (e.prev_hash !== expected) return { valid: false, brokenId: e.id };
    const recomputed = await recomputeHash(e);
    if (recomputed !== e.hash) return { valid: false, brokenId: e.id };
    expected = e.hash;
  }
  return { valid: true };
}

// ---------- Policy engine (mirrors backend/app/policy.py) ----------
const POLICY = {
  FEE_CEILING: 100,
  FEE_REVERSALS_ALLOWED: 1,
  LIMIT_INCREASE_MAX_PCT: 0.25,
  MIN_ACCOUNT_AGE_DAYS: 365
};

function evaluatePolicy(action) {
  if (action.type === 'reverse_fee') {
    if (action.params.amount > POLICY.FEE_CEILING) {
      return { approved: false, reason: `Fee amount $${action.params.amount.toFixed(2)} exceeds the $${POLICY.FEE_CEILING} auto-approval ceiling.`, escalation_reason: 'fee_amount_over_auto_approval_ceiling' };
    }
    if (account.fee_reversals_used >= POLICY.FEE_REVERSALS_ALLOWED) {
      return { approved: false, reason: 'Member already used their courtesy reversal in the last 12 months.', escalation_reason: 'fee_reversal_limit_reached' };
    }
    return { approved: true, reason: 'Within auto-approval policy.' };
  }
  if (action.type === 'increase_limit') {
    if (account.late_payments_12mo > 0) {
      return { approved: false, reason: 'Late payments on file in the last 12 months.', escalation_reason: 'late_payment_history' };
    }
    if (account.account_open_days < POLICY.MIN_ACCOUNT_AGE_DAYS) {
      return { approved: false, reason: 'Account younger than the 12-month minimum for self-serve increases.', escalation_reason: 'account_too_new' };
    }
    const maxAuto = account.credit_limit * (1 + POLICY.LIMIT_INCREASE_MAX_PCT);
    if (action.params.new_limit > maxAuto) {
      return { approved: false, reason: `Requested limit exceeds the ${POLICY.LIMIT_INCREASE_MAX_PCT * 100}% auto-approval cap ($${maxAuto.toFixed(0)}).`, escalation_reason: 'requested_increase_over_cap' };
    }
    return { approved: true, reason: 'Within auto-approval policy.' };
  }
  if (action.type === 'replace_card') {
    return { approved: true, reason: 'Card replacement always self-serve eligible.' };
  }
  return { approved: false, reason: 'Unknown action type.', escalation_reason: 'unknown_action' };
}

function executeAction(action) {
  if (action.type === 'reverse_fee') {
    account.fees_12mo.forEach(f => { if (f.type === action.params.fee_type && !f.reversed) f.reversed = true; });
    account.available_credit += action.params.amount;
    account.fee_reversals_used += 1;
    return { fee_type: action.params.fee_type, amount: action.params.amount, status: 'reversed' };
  }
  if (action.type === 'increase_limit') {
    const delta = action.params.new_limit - account.credit_limit;
    account.credit_limit = action.params.new_limit;
    account.available_credit += delta;
    return { new_limit: action.params.new_limit, status: 'applied' };
  }
  if (action.type === 'replace_card') {
    account.card_status = 'replacement_ordered';
    account.card_last4 = String(Math.floor(1000 + Math.random() * 9000));
    return { new_card_last4: account.card_last4, expedite: action.params.expedite, eta_days: action.params.expedite ? 2 : 6, status: 'ordered' };
  }
}

// ---------- Gemini API calls ----------
let geminiApiKey = '';
let geminiModel = 'gemini-2.5-flash';

async function callGemini(system, messages) {
  if (!geminiApiKey) {
    throw new Error('missing_api_key');
  }
  const contents = messages.map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: m.content }]
  }));
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(geminiModel)}:generateContent`;
  const response = await fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-goog-api-key": geminiApiKey
    },
    body: JSON.stringify({
      contents,
      systemInstruction: { parts: [{ text: system }] },
      generationConfig: { maxOutputTokens: 500, temperature: 0.4 }
    })
  });
  const data = await response.json();
  if (!response.ok) {
    const msg = (data && data.error && data.error.message) || `Gemini API error (${response.status})`;
    throw new Error(msg);
  }
  const candidate = (data.candidates || [])[0];
  const parts = candidate && candidate.content && candidate.content.parts || [];
  return parts.map(p => p.text || '').join('');
}

const DECISION_SYSTEM = `You are the decision layer of a credit-card servicing conversational agent. You do NOT have authority to approve or execute anything -- you only classify intent, extract entities, and propose an action for a downstream policy engine to review.

Categories: fee_reversal, credit_limit_increase, card_replacement, escalate, unknown.
escalate = fraud claims, disputed charges, requests for a human, hostility, or legal threats.

Entities to extract when present:
- fee_reversal: fee_type (default "late_fee" if a fee is clearly being disputed and no type given), amount (number, omit if unknown -- the backend will look up the actual fee)
- credit_limit_increase: requested_limit (number; the member's target NEW total limit -- if they ask for "an increase" with no number, leave null)
- card_replacement: reason (one of lost/stolen/damaged/expired/other), expedite (boolean; true if stolen or explicitly rushed)

Respond with ONLY strict JSON, no markdown fences, no prose outside the JSON:
{"intent":"...","confidence":0.0-1.0,"entities":{},"needs_clarification":true|false,"clarifying_question":"...","reasoning":"one short sentence"}

Never write a member-facing confirmation yourself -- that happens after policy review.`;

const PHRASING_SYSTEM = `You are a warm, concise credit-card servicing agent. You've just received the outcome of a policy and backend check for the member's request. Write ONE natural reply (2-4 sentences, plain text, no markdown) communicating that outcome using only the facts provided. If approved, confirm exactly what happened. If escalated, reassure them a specialist will pick it up with full context already in hand -- don't over-apologize, don't mention internal system names like "policy engine".`;

// ---------- UI helpers ----------
const transcriptEl = document.getElementById('transcript');
const chainEl = document.getElementById('chain');
const snapshotEl = document.getElementById('snapshot');

function fmtMoney(n) { return '$' + n.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 }); }

function renderSnapshot(flashKeys = []) {
  const items = [
    ['Credit limit', fmtMoney(account.credit_limit), 'credit_limit'],
    ['Available', fmtMoney(account.available_credit), 'available_credit'],
    ['Card', '•••• ' + account.card_last4 + (account.card_status === 'replacement_ordered' ? ' (replacement en route)' : ''), 'card'],
    ['Fee reversals used', account.fee_reversals_used + ' / ' + POLICY.FEE_REVERSALS_ALLOWED, 'fee_reversals_used']
  ];
  snapshotEl.innerHTML = items.map(([label, val, key]) =>
    `<div class="snap-item"><div class="snap-label">${label}</div><div class="snap-value ${flashKeys.includes(key) ? 'flash' : ''}">${val}</div></div>`
  ).join('');
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  transcriptEl.appendChild(div);
  transcriptEl.scrollTop = transcriptEl.scrollHeight;
}

function addSystemNote(text) {
  const div = document.createElement('div');
  div.className = 'msg system-note';
  div.textContent = text;
  transcriptEl.appendChild(div);
  transcriptEl.scrollTop = transcriptEl.scrollHeight;
}

let typingEl = null;
function showTyping() {
  typingEl = document.createElement('div');
  typingEl.className = 'typing';
  typingEl.textContent = 'agent is thinking…';
  transcriptEl.appendChild(typingEl);
  transcriptEl.scrollTop = transcriptEl.scrollHeight;
}
function hideTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }

function renderChain() {
  if (chain.length === 0) {
    chainEl.innerHTML = '<div class="empty-hint">No entries yet — start a conversation on the left.</div>';
    return;
  }
  chainEl.innerHTML = chain.map(e => {
    const t = new Date(e.timestamp).toLocaleTimeString();
    const payloadStr = JSON.stringify(e.payload, null, 0);
    return `<div class="block ${e.event_type} ${e._tampered ? 'tampered' : ''}" data-id="${e.id}">
      <div class="node"></div>
      <div class="block-card">
        <div class="block-top">
          <span class="block-type">${e.event_type.replace(/_/g, ' ')}</span>
          <span class="block-time">${t}</span>
        </div>
        <div class="block-actor">${e.actor}</div>
        <div class="block-payload">${escapeHtml(payloadStr)}</div>
        <div class="block-hash">prev <b>${e.prev_hash.slice(0, 8)}</b> → hash <b>${e.hash.slice(0, 8)}</b></div>
      </div>
    </div>`;
  }).join('');
  chainEl.scrollTop = chainEl.scrollHeight;
}

function escapeHtml(s) { return s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }

function safeParseJSON(text) {
  let t = text.trim();
  if (t.startsWith('```')) t = t.replace(/^```json/i, '').replace(/^```/, '').replace(/```$/, '').trim();
  try { return JSON.parse(t); } catch (e) { return null; }
}

// ---------- Flow builders (mirror backend/app/flows/*) ----------
function buildActionRequest(intent, entities) {
  if (intent === 'fee_reversal') {
    const feeType = entities.fee_type || 'late_fee';
    const fee = account.fees_12mo.find(f => f.type === feeType && !f.reversed);
    if (!fee) return null;
    return { type: 'reverse_fee', params: { fee_type: feeType, amount: fee.amount } };
  }
  if (intent === 'credit_limit_increase') {
    if (entities.requested_limit == null) return null;
    return { type: 'increase_limit', params: { new_limit: Number(entities.requested_limit) } };
  }
  if (intent === 'card_replacement') {
    const validReasons = ['lost', 'stolen', 'damaged', 'expired', 'other'];
    if (!validReasons.includes(entities.reason)) return null;
    return { type: 'replace_card', params: { reason: entities.reason, expedite: !!(entities.expedite || entities.reason === 'stolen') } };
  }
  return null;
}

// ---------- Main turn handler ----------
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');

async function handleTurn(userText) {
  if (!geminiApiKey) {
    addSystemNote('No Gemini API key loaded yet — set gemini_api_key in config.yml, then click "Reload config.yml".');
    return;
  }
  addMessage('member', userText);
  conversation.push({ role: 'user', content: userText });
  await appendAudit('message', 'member', { text: userText });

  showTyping();
  let decisionRaw;
  try {
    decisionRaw = await callGemini(DECISION_SYSTEM, conversation);
  } catch (err) {
    hideTyping();
    addSystemNote('Error calling Gemini: ' + err.message + ' — check your API key/model and try again.');
    return;
  }
  const decision = safeParseJSON(decisionRaw);
  hideTyping();

  if (!decision) {
    addSystemNote('Classifier returned an unparseable response — routing to clarification.');
    addMessage('agent', "Sorry, could you rephrase that? I want to make sure I route this correctly.");
    conversation.push({ role: 'assistant', content: "Sorry, could you rephrase that? I want to make sure I route this correctly." });
    return;
  }

  await appendAudit('classification', 'agent', { intent: decision.intent, confidence: decision.confidence, reasoning: decision.reasoning });

  if (decision.intent === 'escalate' || decision.confidence < 0.6) {
    if (decision.intent !== 'escalate' && decision.needs_clarification) {
      await appendAudit('clarification_needed', 'agent', { question: decision.clarifying_question });
      addMessage('agent', decision.clarifying_question || "Could you tell me more about what you need?");
      conversation.push({ role: 'assistant', content: decision.clarifying_question || "Could you tell me more?" });
      return;
    }
    await appendAudit('escalation', 'agent', { reason: 'explicit_escalation_intent', entities: decision.entities });
    escalated = true;
    const msg = "I'm connecting you with a specialist now and passing along everything we've discussed so you won't have to repeat yourself.";
    addMessage('escalation', msg);
    conversation.push({ role: 'assistant', content: msg });
    return;
  }

  if (decision.needs_clarification) {
    await appendAudit('clarification_needed', 'agent', { question: decision.clarifying_question, entities: decision.entities });
    addMessage('agent', decision.clarifying_question);
    conversation.push({ role: 'assistant', content: decision.clarifying_question });
    return;
  }

  const action = buildActionRequest(decision.intent, decision.entities || {});
  if (!action) {
    await appendAudit('escalation', 'agent', { reason: 'no_matching_account_item' });
    escalated = true;
    const msg = "I couldn't find a matching item on your account for that — let me route this to a specialist with what we've covered.";
    addMessage('escalation', msg);
    conversation.push({ role: 'assistant', content: msg });
    return;
  }

  await appendAudit('action_proposed', 'agent', { action });
  const policyDecision = evaluatePolicy(action);
  await appendAudit('policy_decision', 'policy_engine', policyDecision);

  let facts;
  if (!policyDecision.approved) {
    escalated = true;
    await appendAudit('escalation', 'agent', { reason: policyDecision.escalation_reason });
    facts = `Escalated. Reason: ${policyDecision.reason} The member's request and full context have been packaged for a human specialist.`;
  } else {
    const result = executeAction(action);
    await appendAudit('tool_call', `core_system:${action.type}`, { action, result });
    facts = `Approved and executed. Action: ${action.type}. Result: ${JSON.stringify(result)}.`;
    renderSnapshot(Object.keys(result).filter(k => ['new_limit', 'amount', 'new_card_last4'].includes(k)).length ? ['credit_limit', 'available_credit', 'card', 'fee_reversals_used'] : []);
  }

  showTyping();
  let finalReply;
  try {
    finalReply = await callGemini(PHRASING_SYSTEM, [
      ...conversation,
      { role: 'user', content: `[internal outcome, not from the member -- phrase this for them]: ${facts}` }
    ]);
  } catch (err) {
    finalReply = policyDecision.approved ? "Done — that's been taken care of." : "This needs a specialist's review — I've handed it off with full context.";
  }
  hideTyping();
  finalReply = finalReply.trim();
  addMessage(policyDecision.approved ? 'agent' : 'escalation', finalReply);
  conversation.push({ role: 'assistant', content: finalReply });
  renderSnapshot(['credit_limit', 'available_credit', 'card', 'fee_reversals_used']);
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  sendBtn.disabled = true;
  await handleTurn(text);
  sendBtn.disabled = false;
  input.focus();
}

sendBtn.addEventListener('click', send);
input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
document.querySelectorAll('.quick').forEach(q => {
  q.addEventListener('click', () => { input.value = q.dataset.msg; send(); });
});

document.getElementById('verifyBtn').addEventListener('click', async () => {
  const banner = document.getElementById('verifyBanner');
  const result = await verifyChain();
  chain.forEach(e => e._tampered = false);
  if (result.valid) {
    banner.className = 'verify-banner ok';
    banner.textContent = `✓ Chain verified — all ${chain.length} entries intact, hashes recompute cleanly from genesis.`;
  } else {
    const bad = chain.find(e => e.id === result.brokenId);
    if (bad) bad._tampered = true;
    banner.className = 'verify-banner bad';
    banner.textContent = `✗ Tamper detected at entry ${result.brokenId} — recomputed hash no longer matches the stored chain.`;
  }
  renderChain();
});

document.getElementById('tamperBtn').addEventListener('click', () => {
  if (chain.length === 0) return;
  const idx = Math.floor(Math.random() * chain.length);
  chain[idx].payload = { ...chain[idx].payload, __tampered: 'value silently altered' };
  const banner = document.getElementById('verifyBanner');
  banner.className = 'verify-banner bad';
  banner.textContent = `Entry ${chain[idx].id} was just modified in storage. Click "Verify chain integrity" to see it caught.`;
});

// ---------- Gemini connection: loaded from config.yml, never typed into the page ----------
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const configHint = document.getElementById('configHint');

async function loadConfig() {
  statusDot.className = 'dot off';
  statusText.textContent = 'loading config.yml…';
  configHint.style.display = 'none';

  let text;
  try {
    const res = await fetch('./config.yml', { cache: 'no-store' });
    if (!res.ok) throw new Error(`config.yml responded with ${res.status}`);
    text = await res.text();
  } catch (err) {
    statusDot.className = 'dot off';
    statusText.textContent = 'config.yml not reachable';
    configHint.style.display = 'block';
    configHint.innerHTML =
      'Could not load <code>config.yml</code>. If you opened this file directly (file://), browsers block that fetch — ' +
      'serve this folder over a local web server instead, e.g. <code>python3 -m http.server 8000</code>, then open ' +
      '<code>http://localhost:8000/servicing-agent-demo.html</code>. Make sure <code>config.yml</code> sits next to this HTML file.';
    return;
  }

  let parsed;
  try {
    parsed = jsyaml.load(text) || {};
  } catch (err) {
    statusDot.className = 'dot off';
    statusText.textContent = 'config.yml has invalid YAML';
    configHint.style.display = 'block';
    configHint.textContent = 'Could not parse config.yml: ' + err.message;
    return;
  }

  const key = (parsed.gemini_api_key || '').trim();
  const model = (parsed.gemini_model || 'gemini-2.5-flash').trim();
  geminiModel = model;

  if (!key || key === 'YOUR_GEMINI_API_KEY_HERE') {
    geminiApiKey = '';
    statusDot.className = 'dot off';
    statusText.textContent = 'no API key set in config.yml';
    configHint.style.display = 'block';
    configHint.innerHTML = 'Add your key to <code>gemini_api_key</code> in <code>config.yml</code> (get one at aistudio.google.com/apikey), save the file, then click "Reload config.yml".';
    return;
  }

  geminiApiKey = key;
  statusDot.className = 'dot';
  statusText.textContent = 'live · ' + geminiModel;
  appendAudit('connection_configured', 'agent', { model: geminiModel, source: 'config.yml' }); // key itself is never logged
  addSystemNote('Loaded Gemini config (' + geminiModel + ') from config.yml. The key never touches this page\'s UI or the audit log.');
}

document.getElementById('reloadConfigBtn').addEventListener('click', loadConfig);

// ---------- Init ----------
renderSnapshot();
appendAudit('session_started', 'agent', { member_id: account.member_id });
addSystemNote('Session started · account member_demo loaded');
loadConfig();
</script>
