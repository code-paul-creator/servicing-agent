# Ledger — Gemini API configuration
#
# Fill in your Gemini API key below (get one free at https://aistudio.google.com/apikey).
# Keep this file in the SAME FOLDER as servicing-agent-demo.html — the page fetches it
# by relative path ("./config.yml") when it loads.
#
# IMPORTANT: browsers block fetch() for files opened directly (file://). You must serve
# this folder over a local web server, then open the page through that server, e.g.:
#
#   python3 -m http.server 8000
#   # then open http://localhost:8000/servicing-agent-demo.html
#
# or, with Node installed:
#
#   npx serve .
#
# The key is read once at page load (and again if you click "Reload config.yml" in the
# app) and is never typed into, displayed in, or logged by the page itself.

gemini_api_key: "YOUR_GEMINI_API_KEY_HERE"
gemini_model: "gemini-2.5-flash"
