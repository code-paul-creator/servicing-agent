name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write config.yml from secret
        run: |
          cat > config.yml << EOF
          gemini_api_key: "${{ secrets.GEMINI_API_KEY }}"
          gemini_model: "gemini-2.5-flash"
          EOF

      - name: Assemble site
        run: |
          mkdir -p _site
          cp servicing-agent-demo.html _site/index.html
          cp config.yml _site/config.yml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
